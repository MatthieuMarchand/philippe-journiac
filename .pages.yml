media:
  input: public/content/images
  output: /images

content:
# PREMIÈRE COLLECTION : LES TABLEAUX
  - name: tableaux
    label: Mes Tableaux
    type: collection
    path: src/content/tableaux
    fields:
      - name: title
        label: Titre
        type: string
      - name: body
        label: Description
        type: rich-text
      - name: image
        label: Image
        type: image
      - name: dimensions
        label: Dimensions
        type: string
      - name: price
        label: Prix (en euros)
        type: number
      - name: date_created
        label: Date de création
        type: date
        default: ""
        options:
          format: yyyy-MM-dd

# DEUXIÈME COLLECTION : LES ACTUALITÉS
  - name: actualites
    label: Mes Actualités
    type: collection
    path: src/content/actualites
    fields:
      - name: title
        label: Titre
        type: string
      - name: body
        label: Contenu textuel
        type: rich-text
      - name: image
        label: Image
        type: image
      - name: publish_at
        label: Date de publication
        type: date
        options:
          format: yyyy-MM-dd